<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>말랑 Mallang — 나만의 말랑이 만들기</title>
<link rel="stylesheet" href="css/style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍡</text></svg>">
</head>
<body>

<div id="app">

  <!-- ═══════════ 홈 화면 ═══════════ -->
  <section id="screen-home" class="screen active">
    <div class="home-hero">
      <div class="logo-blob" id="logo-blob">
        <div class="blob-face">
          <span class="blob-eye"></span>
          <span class="blob-eye"></span>
          <span class="blob-mouth"></span>
        </div>
      </div>
      <h1 class="app-title">말랑</h1>
      <p class="app-tagline">사진 한 장으로 만드는<br>나만의 귀여운 말랑이 🍡</p>
    </div>
    <div class="home-actions">
      <button class="btn btn-primary btn-big" data-nav="upload">
        📷 말랑이 만들기
      </button>
      <button class="btn btn-secondary btn-big" data-nav="library">
        🗂️ 내 보관함 <span id="home-count" class="count-badge"></span>
      </button>
    </div>
  </section>

  <!-- ═══════════ 사진 업로드 화면 ═══════════ -->
  <section id="screen-upload" class="screen">
    <header class="screen-header">
      <button class="btn-back" data-nav="home">‹</button>
      <h2>사진 업로드</h2>
    </header>
    <div class="upload-body">
      <label id="drop-zone" class="drop-zone" for="file-input">
        <div id="upload-placeholder">
          <div class="drop-icon">🖼️</div>
          <p><strong>사진을 선택하세요</strong></p>
          <p class="hint">아이, 반려동물, 무엇이든 좋아요!</p>
        </div>
        <img id="upload-preview" class="upload-preview" alt="" hidden>
      </label>
      <input type="file" id="file-input" accept="image/*" hidden>

      <div class="style-picker">
        <p class="picker-label">말랑이 스타일 고르기</p>
        <div class="style-grid" id="style-grid">
          <button class="style-card selected" data-style="mochi">
            <span class="style-emoji">🍡</span><span class="style-name">모찌</span>
          </button>
          <button class="style-card" data-style="jelly">
            <span class="style-emoji">🫧</span><span class="style-name">젤리</span>
          </button>
          <button class="style-card" data-style="pudding">
            <span class="style-emoji">🍮</span><span class="style-name">푸딩</span>
          </button>
          <button class="style-card" data-style="slime">
            <span class="style-emoji">🟢</span><span class="style-name">슬라임</span>
          </button>
        </div>
      </div>

      <button class="btn btn-primary btn-big" id="btn-generate" disabled>
        ✨ AI 말랑이 생성
      </button>
    </div>
  </section>

  <!-- ═══════════ AI 생성 중 화면 ═══════════ -->
  <section id="screen-generating" class="screen">
    <div class="generating-body">
      <div class="logo-blob generating-blob">
        <div class="blob-face">
          <span class="blob-eye"></span>
          <span class="blob-eye"></span>
          <span class="blob-mouth"></span>
        </div>
      </div>
      <p class="generating-text" id="generating-text">말랑말랑 반죽하는 중...</p>
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
    </div>
  </section>

  <!-- ═══════════ 결과 화면 ═══════════ -->
  <section id="screen-result" class="screen">
    <header class="screen-header">
      <button class="btn-back" data-nav="upload">‹</button>
      <h2>말랑이 완성!</h2>
    </header>
    <div class="result-body">
      <div class="result-stage">
        <canvas id="result-canvas" width="640" height="640"></canvas>
        <p class="squish-hint">👆 꾹 눌러보세요, 말랑말랑!</p>
      </div>
      <div class="result-actions">
        <button class="btn btn-primary btn-big" id="btn-play">🎨 꾸미고 놀기</button>
        <button class="btn btn-secondary btn-big" id="btn-save">💾 보관함에 저장</button>
        <button class="btn btn-secondary" id="btn-retry">🔄 다시 만들기</button>
      </div>
    </div>
  </section>

  <!-- ═══════════ 놀이터 화면 (만지기·꾸미기·공유) ═══════════ -->
  <section id="screen-play" class="screen">
    <header class="screen-header">
      <button class="btn-back" id="btn-play-back">‹</button>
      <h2>말랑 놀이터</h2>
      <button class="btn btn-primary btn-mini" id="btn-play-save">💾 저장</button>
    </header>
    <div class="play-body">
      <div class="play-stage">
        <canvas id="play-canvas" width="640" height="640"></canvas>
      </div>

      <div class="play-tabs">
        <button class="tab selected" data-tab="touch">🖐️ 만지기</button>
        <button class="tab" data-tab="deco">🎨 꾸미기</button>
        <button class="tab" data-tab="share">📤 공유</button>
      </div>

      <div class="tab-panel" id="panel-touch">
        <p class="hint center">꾹 누르고, 끌어당기고, 튕겨보세요! 말랑말랑 🫧</p>
      </div>

      <div class="tab-panel" id="panel-deco" hidden>
        <div class="deco-row">
          <p class="picker-label">배경</p>
          <div class="chip-row" id="bg-row"></div>
        </div>
        <div class="deco-row">
          <p class="picker-label">모자</p>
          <div class="chip-row" id="hat-row"></div>
        </div>
        <div class="deco-row">
          <p class="picker-label">스티커 <span class="hint">(붙인 뒤 끌어서 옮길 수 있어요)</span></p>
          <div class="chip-row" id="sticker-row"></div>
        </div>
      </div>

      <div class="tab-panel" id="panel-share" hidden>
        <div class="share-row">
          <button class="btn btn-secondary" id="btn-share-image">🖼️ 이미지</button>
          <button class="btn btn-secondary" id="btn-share-gif">🎞️ GIF</button>
          <button class="btn btn-secondary" id="btn-share-video">🎬 영상</button>
        </div>
        <p class="hint center">공유가 안 되는 기기에서는 파일로 저장돼요</p>
      </div>
    </div>
  </section>

  <!-- ═══════════ 보관함 화면 ═══════════ -->
  <section id="screen-library" class="screen">
    <header class="screen-header">
      <button class="btn-back" data-nav="home">‹</button>
      <h2>내 보관함</h2>
    </header>
    <div class="library-body">
      <div id="library-empty" class="library-empty" hidden>
        <div class="drop-icon">🫙</div>
        <p>아직 말랑이가 없어요.<br>첫 말랑이를 만들어 보세요!</p>
        <button class="btn btn-primary" data-nav="upload">📷 말랑이 만들기</button>
      </div>
      <div id="library-grid" class="library-grid"></div>
    </div>
  </section>

  <!-- ═══════════ 보관함 상세 (모달) ═══════════ -->
  <div id="detail-modal" class="modal" hidden>
    <div class="modal-card">
      <img id="detail-img" alt="말랑이">
      <p id="detail-meta" class="detail-meta"></p>
      <div class="modal-actions">
        <button class="btn btn-primary" id="btn-play-item">🎠 꾸미고 놀기</button>
        <a class="btn btn-secondary" id="btn-download" download="mallang.png">⬇️ 이미지 저장</a>
        <button class="btn btn-danger" id="btn-delete">🗑️ 삭제</button>
        <button class="btn btn-secondary" id="btn-close-modal">닫기</button>
      </div>
    </div>
  </div>

  <!-- 토스트 -->
  <div id="toast" class="toast" hidden></div>
</div>

<script src="js/store.js"></script>
<script src="js/mallang.js"></script>
<script src="js/gif.js"></script>
<script src="js/play.js"></script>
<script src="js/app.js"></script>
</body>
</html>
